version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: instaguard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  python-worker:
    build: ./workers/python
    ports:
      - '8001:8001'
    environment:
      PYTHON_WORKER_SECRET: worker-secret-key
    restart: unless-stopped

  nextjs:
    build: .
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/instaguard
      REDIS_URL: redis://redis:6379
      PYTHON_WORKER_URL: http://python-worker:8001
      PYTHON_WORKER_SECRET: worker-secret-key
      JWT_SECRET: super-secret-jwt-key-change-in-production
    depends_on:
      - postgres
      - redis
      - python-worker
    restart: unless-stopped

volumes:
  postgres_data:
